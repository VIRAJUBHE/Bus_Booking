<div class="login-container">
  <div class="login-card">

    <h2>Admin Login</h2>
    <p class="subtitle">Access control panel</p>

    <form (ngSubmit)="login()">

      <div class="form-group">
        <input 
          type="text" 
          placeholder="Username"
          [(ngModel)]="username"
          name="username"
          required
        />
      </div>

      <div class="form-group">
        <input 
          type="password" 
          placeholder="Password"
          [(ngModel)]="password"
          name="password"
          required
        />
      </div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>

      <p class="error" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>

    </form>

  </div>
</div>
